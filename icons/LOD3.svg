<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Радиальный градиент фона (ЭФФЕКТ ВИНЬЕТКИ) -->
    <!-- Центр светлее, края уходят в глубокую тень -->
    <radialGradient id="vignetteGrad" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#2C2824" />   <!-- Теплый центр (подсветка от глобуса) -->
      <stop offset="60%" stop-color="#151311" />  <!-- Плавный переход -->
      <stop offset="100%" stop-color="#050404" /> <!-- Очень темные, почти черные углы -->
    </radialGradient>

    <!-- Золотой градиент для глобуса -->
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#DFC48B" />
      <stop offset="100%" stop-color="#B28236" />
    </linearGradient>

    <!-- Радиальный градиент для Ядра (создает объемную сферу) -->
    <radialGradient id="coreGrad" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#8BE0D9" />   <!-- Светлый блик -->
      <stop offset="45%" stop-color="#5FA39E" />  <!-- Базовый бирюзовый -->
      <stop offset="100%" stop-color="#1B3D3A" /> <!-- Глубокая тень для объема -->
    </radialGradient>
    
    <!-- Универсальное свечение (усилено под новый крупный размер) -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Базовая форма иконки с виньеткой -->
  <rect width="512" height="512" rx="115" fill="url(#vignetteGrad)" />
  
  <!-- УВЕЛИЧЕННЫЙ ЗОЛОТОЙ ГЛОБУС СО СВЕЧЕНИЕМ -->
  <!-- Масштаб линий увеличен, чтобы заполнить холст -->
  <g stroke="url(#goldGrad)" fill="none" filter="url(#glow)">
    <!-- Контур глобуса -->
    <circle cx="256" cy="256" r="180" stroke-width="14" />
    <!-- Экватор -->
    <ellipse cx="256" cy="256" rx="180" ry="60" stroke-width="10" />
    <!-- Меридиан -->
    <ellipse cx="256" cy="256" rx="60" ry="180" stroke-width="10" />
  </g>

  <!-- УВЕЛИЧЕННОЕ ЦЕНТРАЛЬНОЕ ЯДРО -->
  <!-- Бирюзовый шар масштабирован пропорционально глобусу -->
  <circle cx="256" cy="256" r="38" fill="url(#coreGrad)" filter="url(#glow)" />
  
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Темный фон -->
  <circle cx="256" cy="256" r="256" fill="#000000" />

  <g transform="translate(256, 256) rotate(45) translate(-256, -256)">
    <!-- Розовый лепесток (Здоровье) -->
    <rect x="220" y="80" width="72" height="130" rx="36" fill="#E91E63" />
    <!-- Синий лепесток (Вода) -->
    <rect x="220" y="302" width="72" height="130" rx="36" fill="#4285F4" />
    <!-- Оранжевый лепесток (Еда) -->
    <rect x="80" y="220" width="130" height="72" rx="36" fill="#F29900" />
    <!-- Зеленый лепесток (Спорт) -->
    <rect x="302" y="220" width="130" height="72" rx="36" fill="#34A853" />
    
    <!-- Центральная точка связки -->
    <circle cx="256" cy="256" r="20" fill="#FFFFFF" />
  </g>
</svg>
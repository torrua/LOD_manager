<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Чистый темный фон -->
  <rect width="512" height="512" rx="115" fill="#12100E" />
  
  <!-- ТОЛЬКО ОРБИТЫ (Без внешнего круга) -->
  <g stroke="#C89B53" fill="none" stroke-width="20">
    <!-- Экватор -->
    <ellipse cx="256" cy="256" rx="190" ry="70" />
    <!-- Меридиан -->
    <ellipse cx="256" cy="256" rx="70" ry="190" />
  </g>

  <!-- ЧИСТОЕ ЯДРО (Без обводки) -->
  <circle cx="256" cy="256" r="44" fill="#5FA39E" />
</svg>
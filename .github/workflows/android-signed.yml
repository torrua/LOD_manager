name: Android Signed Release

# Run this workflow only manually (from Actions tab → "Run workflow")
# or add it to the release.yml trigger once you have a keystore.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to attach the signed APK to (e.g. v1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  android-signed:
    name: Android Signed APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: temurin

      - uses: android-actions/setup-android@v4

      - name: Install NDK r26
        run: |
          sdkmanager --install "ndk;26.3.11579264"
          echo "NDK_HOME=$ANDROID_HOME/ndk/26.3.11579264" >> $GITHUB_ENV

      - run: cargo install cargo-ndk --locked
      - run: npm ci

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > $HOME/release.jks

      - name: Init Tauri Android
        run: npx tauri android init
        env:
          NDK_HOME: ${{ env.NDK_HOME }}

      - name: Build signed release APK
        run: npx tauri android build --target aarch64
        env:
          NDK_HOME: ${{ env.NDK_HOME }}
          # These env vars are picked up by Tauri's Gradle config
          TAURI_ANDROID_KEYSTORE: $HOME/release.jks
          TAURI_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          TAURI_ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          TAURI_ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload signed APK to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          files: src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

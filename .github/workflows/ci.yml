name: CI

# Run after autoformat completes (to get the corrected code)
# Or directly on PRs to check code before merge.
on:
  workflow_run:
    workflows: [Auto-format]
    branches: [main, develop]
    types: [completed]
  pull_request:
    branches: [main, develop]

# Cancel outdated runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────
  # Frontend: ESLint + Prettier check + svelte-check (TypeScript)
  # ─────────────────────────────────────────────────────────────
  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Run on PR or when triggered by completed autoformat workflow
    if: github.event_name == 'pull_request' || github.event.workflow_run.conclusion != 'failure'

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prettier + ESLint + TypeScript
        run: npm run ci:check

  # ─────────────────────────────────────────────────────────────
  # Rust: rustfmt check + Clippy + cargo test
  # ─────────────────────────────────────────────────────────────
  rust:
    name: Rust checks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'pull_request' || github.event.workflow_run.conclusion != 'failure'

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable + components
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # System libs required by Tauri on Linux - use apt cache
      - name: Install Tauri system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: rustfmt + Clippy + test
        run: |
          cargo fmt --manifest-path src-tauri/Cargo.toml -- --check
          cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings
          cargo test --manifest-path src-tauri/Cargo.toml

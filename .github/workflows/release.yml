name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  windows:
    name: Windows Build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable-x86_64-pc-windows-msvc
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci
      - name: Sync version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node -e "
            const fs=require('fs'), p='src-tauri/tauri.conf.json';
            const c=JSON.parse(fs.readFileSync(p,'utf8'));
            c.version='$VERSION';
            fs.writeFileSync(p,JSON.stringify(c,null,2));
          "
          npm version "$VERSION" --no-git-tag-version --allow-same-version
      - name: Build Tauri app
        run: npx tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  android:
    name: Android Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config libssl-dev \
            libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev \
            libappindicator3-dev librsvg2-dev patchelf

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: temurin

      - uses: android-actions/setup-android@v3

      - name: Set NDK_HOME to pre-installed NDK
        run: |
          NDK_VER=$(ls "$ANDROID_HOME/ndk" | sort -V | tail -1)
          echo "NDK_HOME=$ANDROID_HOME/ndk/$NDK_VER" >> $GITHUB_ENV

      - run: cargo install cargo-ndk --locked
      - run: npm ci

      - name: Sync version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node -e "
            const fs=require('fs'), p='src-tauri/tauri.conf.json';
            const c=JSON.parse(fs.readFileSync(p,'utf8'));
            c.version='$VERSION';
            fs.writeFileSync(p,JSON.stringify(c,null,2));
          "
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Init Android project
        run: npx tauri android init
        env:
          NDK_HOME: ${{ env.NDK_HOME }}

      # ═══════════════════════════════════════════════════════════════════════
      # ПОДПИСЬ APK — выберите один из вариантов:
      #
      # ВАРИАНТ A (активен): debug-подпись — работает сразу, без секретов.
      #   Устанавливается через "Неизвестные источники". Для личного/тестового
      #   использования этого достаточно.
      #
      # ВАРИАНТ B: release-подпись через keystore — для публикации.
      #   Инструкция по переходу на вариант B — см. комментарий ниже.
      # ═══════════════════════════════════════════════════════════════════════

      # ── ВАРИАНТ A: debug APK (активен) ────────────────────────────────────
      - name: Build Android APK
        run: npx tauri android build --target aarch64 --debug
        env:
          NDK_HOME: ${{ env.NDK_HOME }}

      # ── ВАРИАНТ B: release APK с keystore (раскомментировать) ─────────────
      # Шаги для активации:
      # 1. Создайте keystore локально:
      #      keytool -genkeypair -v -keystore release.jks -alias lod \
      #        -keyalg RSA -keysize 2048 -validity 10000
      # 2. Добавьте 4 секрета в GitHub → Settings → Secrets → Actions:
      #      ANDROID_KEYSTORE   = $(base64 -w0 release.jks)
      #      ANDROID_KEY_ALIAS  = lod
      #      ANDROID_KEY_PASS   = <пароль ключа>
      #      ANDROID_STORE_PASS = <пароль хранилища>
      # 3. Замените шаг "Build Android APK" выше на эти два шага:
      #
      # - name: Decode keystore
      #   run: |
      #     echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 -d \
      #       > src-tauri/gen/android/release.jks
      #
      # - name: Build Android APK (release-signed)
      #   run: npx tauri android build --target aarch64
      #   env:
      #     NDK_HOME:               ${{ env.NDK_HOME }}
      #     ANDROID_KEY_ALIAS:      ${{ secrets.ANDROID_KEY_ALIAS }}
      #     ANDROID_KEY_PASSWORD:   ${{ secrets.ANDROID_KEY_PASS }}
      #     ANDROID_STORE_FILE:     release.jks
      #     ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASS }}

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: src-tauri/gen/android/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

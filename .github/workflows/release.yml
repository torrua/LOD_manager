name: Release

# Triggers on version tags: git tag v1.2.3 && git push --tags
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

# Allow the workflow to create GitHub Releases and upload assets
permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────────────────────
  # 1. Windows — produces lod-manager_x64.msi + lod-manager_x64-setup.exe
  # ─────────────────────────────────────────────────────────────
  windows:
    name: Windows Build
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable-x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci

      # tauri-apps/tauri-action builds the app AND creates a GitHub Release
      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: LOD Manager ${{ github.ref_name }}
          releaseBody: |
            ## What's new
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.

            ## Downloads
            | Platform | File |
            |----------|------|
            | Windows (installer) | `lod-manager_x64-setup.exe` |
            | Windows (MSI) | `lod-manager_x64.msi` |
            | Android (debug APK) | `lod-manager-debug.apk` |
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false

  # ─────────────────────────────────────────────────────────────
  # 2. Android — produces a debug APK
  #    For a signed release APK, add keystore secrets (see README)
  # ─────────────────────────────────────────────────────────────
  android:
    name: Android Build
    runs-on: ubuntu-latest
    # Upload to the Release created by the windows job
    needs: windows

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable + Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK r26
        run: |
          sdkmanager --install "ndk;26.3.11579264"
          echo "NDK_HOME=$ANDROID_HOME/ndk/26.3.11579264" >> $GITHUB_ENV

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Install npm dependencies
        run: npm ci

      - name: Initialise Tauri Android project
        run: npx tauri android init
        env:
          NDK_HOME: ${{ env.NDK_HOME }}

      # Build a debug APK (no keystore needed)
      - name: Build Android debug APK
        run: npx tauri android build --debug --target aarch64
        env:
          NDK_HOME: ${{ env.NDK_HOME }}

      - name: Find APK
        id: find_apk
        run: |
          APK=$(find src-tauri/gen/android -name "*.apk" | head -1)
          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          echo "Found APK: $APK"

      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ steps.find_apk.outputs.apk_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

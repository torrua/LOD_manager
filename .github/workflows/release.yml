name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Windows: builds MSI + NSIS installer
  # ─────────────────────────────────────────────────────────────────────────
  windows:
    name: Windows Build
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable (MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable-x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci

      # Sync version from git tag (strips leading 'v') into tauri.conf.json
      # so the installer shows the correct version (e.g. v1.2.3 → 1.2.3).
      - name: Sync version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Building version: $VERSION"
          # patch tauri.conf.json
          node -e "
            const fs = require('fs');
            const p = 'src-tauri/tauri.conf.json';
            const c = JSON.parse(fs.readFileSync(p,'utf8'));
            c.version = '$VERSION';
            fs.writeFileSync(p, JSON.stringify(c, null, 2));
          "
          # also patch package.json so npm/node see the same version
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      # tauri build automatically runs beforeBuildCommand (npm run build).
      # Do NOT run npm run build manually here — it would run twice.
      - name: Build Tauri app
        run: npx tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows installers
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────────────────────────────
  # Android: builds a release APK
  # Runs in parallel with Windows (no `needs: windows`).
  # ─────────────────────────────────────────────────────────────────────────
  android:
    name: Android Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      # 1. Устанавливаем системные зависимости, необходимые для компиляции
      # C-кода (включая SQLite и системные библиотеки Rust)
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libssl-dev \
            libsqlite3-dev

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install Rust stable + Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: temurin

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          sdkmanager --install "ndk;26.3.11579264"
          echo "NDK_HOME=$ANDROID_HOME/ndk/26.3.11579264" >> $GITHUB_ENV

      - name: Install npm dependencies
        run: npm ci

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Build Frontend
        run: npm run build

      - name: Build Android APK
        run: |
          npx tauri android init
          npx tauri android build --target aarch64
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
          PKG_CONFIG_ALLOW_CROSS: 1
          SKIP_WEBVIEW_INSTALL: 1

      - name: Upload Android APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: src-tauri/gen/android/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

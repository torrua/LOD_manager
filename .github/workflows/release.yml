name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

# Prevent parallel releases
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  windows:
    name: Windows Build
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable-x86_64-pc-windows-msvc
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm install
      - name: Sync version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node -e "
            const fs=require('fs'), p='src-tauri/tauri.conf.json';
            const c=JSON.parse(fs.readFileSync(p,'utf8'));
            c.version='$VERSION';
            fs.writeFileSync(p,JSON.stringify(c,null,2));
          "
          npm version "$VERSION" --no-git-tag-version --allow-same-version
      - name: Build Tauri app
        run: npx tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  android:
    name: Android Build
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config libssl-dev \
            libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev \
            libappindicator3-dev librsvg2-dev patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: temurin

      - uses: android-actions/setup-android@v3

      - name: Set NDK_HOME to pre-installed NDK
        run: |
          NDK_VER=$(ls "$ANDROID_HOME/ndk" | sort -V | tail -1)
          echo "NDK_HOME=$ANDROID_HOME/ndk/$NDK_VER" >> $GITHUB_ENV

      - run: cargo install cargo-ndk --locked
      - run: npm install

      - name: Sync version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node -e "
            const fs=require('fs'), p='src-tauri/tauri.conf.json';
            const c=JSON.parse(fs.readFileSync(p,'utf8'));
            c.version='$VERSION';
            fs.writeFileSync(p,JSON.stringify(c,null,2));
          "
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Init Android project
        run: npx tauri android init
        env:
          NDK_HOME: ${{ env.NDK_HOME }}

      - name: Copy Android icons to generated project
        run: |
          cp -r src-tauri/icons/android/* src-tauri/gen/android/app/src/main/res/

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > $HOME/release.jks

      - name: Build signed Android APK
        run: npx tauri android build --target aarch64
        env:
          NDK_HOME: ${{ env.NDK_HOME }}
          TAURI_ANDROID_KEYSTORE: $HOME/release.jks
          TAURI_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          TAURI_ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          TAURI_ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Rename APK
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          APK=$(find src-tauri/gen/android -name "*-release.apk" | head -1)
          if [ -n "$APK" ]; then
            DEST="src-tauri/gen/android/LOD.Manager_${VERSION}_aarch64.apk"
            mv "$APK" "$DEST"
            echo "Renamed to: $DEST"
          else
            echo "No signed APK found!"
            exit 1
          fi

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: src-tauri/gen/android/LOD.Manager_*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

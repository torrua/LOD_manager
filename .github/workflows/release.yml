name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Windows: MSI + NSIS installer
  # ─────────────────────────────────────────────────────────────────────────
  windows:
    name: Windows Build
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable (MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable-x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci

      - name: Sync version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node -e "
            const fs = require('fs');
            const p = 'src-tauri/tauri.conf.json';
            const c = JSON.parse(fs.readFileSync(p,'utf8'));
            c.version = '$VERSION';
            fs.writeFileSync(p, JSON.stringify(c, null, 2));
          "
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      # tauri build calls beforeBuildCommand (npm run build) automatically.
      - name: Build Tauri app
        run: npx tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows installers
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────────────────────────────
  # Android: release APK (parallel with Windows)
  # ─────────────────────────────────────────────────────────────────────────
  android:
    name: Android Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      # Tauri's Rust crate compiles build scripts for the HOST (x86_64-linux),
      # which transitively require glib/webkit2gtk headers even when the final
      # target is Android. Without these the build fails with:
      #   "The system library `glib-2.0` required by crate `glib-sys` was not found."
      - name: Install system dependencies (host build scripts need gtk/glib)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libssl-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install Rust stable + Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: temurin

      # setup-android installs cmdline-tools and sets ANDROID_HOME.
      # The runner already ships NDK 29.x — we use that instead of
      # downloading NDK 26 separately, which avoids version mismatches.
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set NDK_HOME to pre-installed NDK
        run: |
          # Use the newest installed NDK (the runner ships one by default)
          NDK_VER=$(ls "$ANDROID_HOME/ndk" | sort -V | tail -1)
          echo "Using NDK: $NDK_VER"
          echo "NDK_HOME=$ANDROID_HOME/ndk/$NDK_VER" >> $GITHUB_ENV

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Install npm dependencies
        run: npm ci

      - name: Sync version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node -e "
            const fs = require('fs');
            const p = 'src-tauri/tauri.conf.json';
            const c = JSON.parse(fs.readFileSync(p,'utf8'));
            c.version = '$VERSION';
            fs.writeFileSync(p, JSON.stringify(c, null, 2));
          "
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Init Android project
        run: npx tauri android init
        env:
          NDK_HOME: ${{ env.NDK_HOME }}

      # tauri android build calls beforeBuildCommand (npm run build) automatically.
      - name: Build Android APK
        run: npx tauri android build --target aarch64
        env:
          NDK_HOME: ${{ env.NDK_HOME }}

      - name: Upload Android APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: src-tauri/gen/android/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

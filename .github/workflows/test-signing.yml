name: Test Android Signing Methods

on:
  workflow_dispatch: # позволяет запустить вручную
  push:
    branches: [main, master] # замените на вашу ветку разработки

permissions:
  contents: read

jobs:
  signing-test:
    name: Signing method - ${{ matrix.method }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        method:
          - gradle-props # только gradle.properties
          - env-vars # только переменные окружения TAURI_ANDROID_*
          - both-absolute # комбинация с абсолютным путём к keystore

    steps:
      - uses: actions/checkout@v6

      # Системные зависимости (как в исходном workflow)
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config libssl-dev \
            libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev \
            libappindicator3-dev librsvg2-dev patchelf

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - uses: android-actions/setup-android@v3

      - name: Set NDK_HOME
        run: |
          NDK_VER=$(ls "$ANDROID_HOME/ndk" | sort -V | tail -1)
          echo "NDK_HOME=$ANDROID_HOME/ndk/$NDK_VER" >> $GITHUB_ENV

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Install npm dependencies
        run: npm ci

      # Инициализация Android проекта (если ещё не сделано)
      - name: Init Android project
        run: npx tauri android init
        env:
          NDK_HOME: ${{ env.NDK_HOME }}

      # Общий шаг: декодирование keystore
      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > src-tauri/gen/android/release.jks
          chmod 600 src-tauri/gen/android/release.jks

      # ------------------------------------------------------------
      # Настройка подписи в зависимости от метода
      # ------------------------------------------------------------
      - name: Setup signing - gradle.properties
        if: matrix.method == 'gradle-props'
        run: |
          # Очищаем старые записи на всякий случай
          sed -i '/RELEASE_STORE_/d' src-tauri/gen/android/gradle.properties 2>/dev/null || true
          {
            echo ""
            echo "RELEASE_STORE_FILE=release.jks"
            echo "RELEASE_STORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}"
            echo "RELEASE_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}"
            echo "RELEASE_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}"
          } >> src-tauri/gen/android/gradle.properties
          echo "gradle.properties content (without passwords):"
          grep -v PASSWORD src-tauri/gen/android/gradle.properties || true

      - name: Setup signing - environment variables
        if: matrix.method == 'env-vars'
        run: |
          # Удаляем любые строки подписи из gradle.properties, чтобы они не мешали
          sed -i '/RELEASE_STORE_/d' src-tauri/gen/android/gradle.properties 2>/dev/null || true
          echo "Environment variables will be used:"
          echo "TAURI_ANDROID_KEYSTORE=${{ github.workspace }}/src-tauri/gen/android/release.jks"
          echo "TAURI_ANDROID_KEYSTORE_PASSWORD length: ${#ANDROID_KEYSTORE_PASSWORD}"
          echo "TAURI_ANDROID_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}"
          echo "TAURI_ANDROID_KEY_PASSWORD length: ${#ANDROID_KEY_PASSWORD}"
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Setup signing - both (absolute path)
        if: matrix.method == 'both-absolute'
        run: |
          # Используем абсолютный путь в переменных окружения,
          # но также оставляем gradle.properties (как в оригинале) для проверки.
          sed -i '/RELEASE_STORE_/d' src-tauri/gen/android/gradle.properties 2>/dev/null || true
          {
            echo ""
            echo "RELEASE_STORE_FILE=release.jks"
            echo "RELEASE_STORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}"
            echo "RELEASE_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}"
            echo "RELEASE_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}"
          } >> src-tauri/gen/android/gradle.properties
          echo "gradle.properties content (without passwords):"
          grep -v PASSWORD src-tauri/gen/android/gradle.properties || true
          echo "Also setting absolute env vars:"
          echo "TAURI_ANDROID_KEYSTORE=${{ github.workspace }}/src-tauri/gen/android/release.jks"
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      # ------------------------------------------------------------
      # Сборка APK (общая команда, но с разным окружением)
      # ------------------------------------------------------------
      - name: Build Android APK
        run: npx tauri android build --target aarch64 --apk
        env:
          NDK_HOME: ${{ env.NDK_HOME }}
          # Для методов, использующих переменные окружения, они будут переданы здесь.
          # GitHub Actions автоматически экранирует secrets, поэтому можно использовать их напрямую.
          TAURI_ANDROID_KEYSTORE: ${{ matrix.method == 'env-vars' || matrix.method == 'both-absolute' && github.workspace }}/src-tauri/gen/android/release.jks
          TAURI_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          TAURI_ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          TAURI_ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      # ------------------------------------------------------------
      # Поиск и проверка подписи
      # ------------------------------------------------------------
      - name: Find APK and check signature
        id: check_apk
        run: |
          # Ищем APK в типичных местах
          UNSIGNED=$(find src-tauri/gen/android -name "*release-unsigned.apk" | head -1)
          SIGNED=$(find src-tauri/gen/android -name "*release.apk" | grep -v unsigned | head -1)

          if [ -n "$SIGNED" ]; then
            echo "✅ Found signed APK: $SIGNED"
            cp "$SIGNED" "signed-${{ matrix.method }}.apk"
            echo "status=signed" >> $GITHUB_OUTPUT
            echo "file=signed-${{ matrix.method }}.apk" >> $GITHUB_OUTPUT
          elif [ -n "$UNSIGNED" ]; then
            echo "❌ Found unsigned APK: $UNSIGNED"
            cp "$UNSIGNED" "unsigned-${{ matrix.method }}.apk"
            echo "status=unsigned" >> $GITHUB_OUTPUT
            echo "file=unsigned-${{ matrix.method }}.apk" >> $GITHUB_OUTPUT
          else
            echo "No APK found!"
            exit 1
          fi

      # Загружаем APK как артефакт
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ matrix.method }}-${{ steps.check_apk.outputs.status }}
          path: ${{ steps.check_apk.outputs.file }}
          if-no-files-found: error
